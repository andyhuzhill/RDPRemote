<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDPRemote - 被控端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ RDPRemote 被控端</h1>
            <p class="subtitle">远程桌面控制系统</p>
        </header>

        <main>
            <div class="card device-info">
                <h2>设备信息</h2>
                <div class="info-row">
                    <span class="label">设备代码:</span>
                    <span class="value" id="device-code">正在生成...</span>
                </div>
                <div class="info-row">
                    <span class="label">平台:</span>
                    <span class="value" id="platform-info">-</span>
                </div>
                <div class="info-row">
                    <span class="label">状态:</span>
                    <span class="value status" id="status">等待连接</span>
                </div>
            </div>

            <div class="card connection-info">
                <h2>连接密码</h2>
                <div class="password-display">
                    <code id="connection-password">-</code>
                    <button id="copy-password" class="btn btn-small">复制</button>
                </div>
                <p class="hint">将此密码提供给控制端以建立连接</p>
            </div>

            <div class="card actions">
                <h2>操作</h2>
                <div class="btn-group">
                    <button id="btn-regenerate" class="btn btn-primary">重新生成密码</button>
                    <button id="btn-refresh" class="btn btn-secondary">刷新设备信息</button>
                    <button id="btn-settings" class="btn btn-outline">⚙️ 设置</button>
                </div>
            </div>

            <div class="card logs">
                <h2>连接日志</h2>
                <div id="log-container">
                    <p class="log-entry">等待连接...</p>
                </div>
            </div>
        </main>

        <!-- 设置面板 -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-header">
                <h2>⚙️ 设置</h2>
                <button id="btn-close-settings" class="btn-close">&times;</button>
            </div>
            
            <div class="settings-content">
                <!-- 连接设置 -->
                <div class="settings-section">
                    <h3>连接设置</h3>
                    <div class="setting-item">
                        <label for="setting-auto-reconnect">自动重连</label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="setting-auto-reconnect" checked>
                            <span class="toggle-slider"></span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label for="setting-max-reconnect-attempts">最大重连次数</label>
                        <input type="number" id="setting-max-reconnect-attempts" value="5" min="1" max="10">
                    </div>
                    <div class="setting-item">
                        <label for="setting-reconnect-delay">重连延迟 (秒)</label>
                        <input type="number" id="setting-reconnect-delay" value="3" min="1" max="30">
                    </div>
                </div>
                
                <!-- 视频设置 -->
                <div class="settings-section">
                    <h3>视频设置</h3>
                    <div class="setting-item">
                        <label for="setting-video-quality">视频质量</label>
                        <select id="setting-video-quality">
                            <option value="low">低 (360p)</option>
                            <option value="medium" selected>中 (720p)</option>
                            <option value="high">高 (1080p)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="setting-frame-rate">帧率 (FPS)</label>
                        <select id="setting-frame-rate">
                            <option value="15">15 FPS</option>
                            <option value="30" selected>30 FPS</option>
                            <option value="60">60 FPS</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="setting-adaptive-bitrate">自适应码率</label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="setting-adaptive-bitrate" checked>
                            <span class="toggle-slider"></span>
                        </div>
                    </div>
                </div>
                
                <!-- 安全设置 -->
                <div class="settings-section">
                    <h3>安全设置</h3>
                    <div class="setting-item">
                        <label for="setting-password-expiry">密码有效期 (分钟)</label>
                        <input type="number" id="setting-password-expiry" value="30" min="5" max="1440">
                    </div>
                    <div class="setting-item">
                        <label for="setting-require-confirmation">连接确认</label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="setting-require-confirmation">
                            <span class="toggle-slider"></span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label for="setting-log-level">日志级别</label>
                        <select id="setting-log-level">
                            <option value="debug">调试</option>
                            <option value="info" selected>信息</option>
                            <option value="warning">警告</option>
                            <option value="error">错误</option>
                        </select>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="settings-actions">
                    <button id="btn-reset-settings" class="btn btn-secondary">重置为默认</button>
                    <button id="btn-save-settings" class="btn btn-primary">保存设置</button>
                </div>
            </div>
        </div>
        
        <!-- 设置面板遮罩 -->
        <div id="settings-overlay" class="settings-overlay hidden"></div>

        <footer>
            <p>RDPRemote v1.0 | WebRTC + VP9 远程桌面</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
