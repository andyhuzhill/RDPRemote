# RDP Remote TURN Server Configuration
#
# This configuration is for coturn TURN server used in local testing.
#
# Usage:
#   turnserver -c turnserver.conf
#
# Credentials:
#   Username: rdpremote
#   Password: rdpremote123

# Listening ports
listening-port=3478
tls-listening-port=5349

# TURN server identity
realm=rdpremote.local
server-name=rdpremote-turn

# Authentication
user=rdpremote:rdpremote123

# Static auth secret (alternative to user/pass above)
# static-auth-secret=rdpremote123

# Enable TURN long-term credential mechanism
lt-cred-mech

# Allow external IPs
external-ip=127.0.0.1

# Enable verbose logging for debugging
verbose

# Logging
log-file=/tmp/turnserver.log
syslog

# No simple auth (use long-term credential)
no-simple-auth

# Enable UDP and TCP
no-udp=false
no-tcp=false

# Enable TLS
no-tls=false

# Enable DTLS
no-dtls=false

# Realm for TURN
realm=rdpremote.local

# Fingerprint (required for some clients)
fingerprint

# Use external IP
external-ip=127.0.0.1

# Min and max ports for allocation
min-port=49152
max-port=65535
